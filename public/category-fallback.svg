<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#grad2)"/>
  <!-- Flower pot -->
  <path d="M150 280 L170 360 L230 360 L250 280 Z" fill="#9d174d" opacity="0.6"/>
  <!-- Flower stem 1 -->
  <line x1="180" y1="280" x2="180" y2="180" stroke="#059669" stroke-width="4"/>
  <circle cx="180" cy="160" r="30" fill="#ec4899" opacity="0.7"/>
  <!-- Flower stem 2 -->
  <line x1="200" y1="280" x2="200" y2="160" stroke="#059669" stroke-width="4"/>
  <circle cx="200" cy="140" r="35" fill="#f472b6" opacity="0.7"/>
  <!-- Flower stem 3 -->
  <line x1="220" y1="280" x2="220" y2="170" stroke="#059669" stroke-width="4"/>
  <circle cx="220" cy="150" r="32" fill="#db2777" opacity="0.7"/>
  <!-- Leaves -->
  <ellipse cx="160" cy="240" rx="20" ry="10" fill="#10b981" opacity="0.5" transform="rotate(-30 160 240)"/>
  <ellipse cx="240" cy="250" rx="20" ry="10" fill="#10b981" opacity="0.5" transform="rotate(30 240 250)"/>
  <text x="200" y="390" font-family="Arial" font-size="14" fill="#9d174d" text-anchor="middle">Категорія</text>
</svg>
